<script type="module" src="https://cdn.jsdelivr.net/npm/media-chrome@3/+esm"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/youtube-video-element@1/+esm"></script>

<media-controller>
  <youtube-video
    slot="media"
    src="https://www.youtube.com/watch?v=aqz-KE-bpKQ"

  <media-control-bar>

    <media-time-range></media-time-range>
  </media-control-bar>
</media-controller>
